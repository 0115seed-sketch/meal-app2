name: Auto Update School Meal

on:
  schedule:
    # 한국 표준시(KST) 오전 6시 실행 (UTC 기준 21시)
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-meal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Download Korean Font
        run: |
          curl -L -o NanumGothic.ttf https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Regular.ttf

      - name: Run meal update script
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: python update_meal.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -f NanumGothic.ttf
          git add -A index.html images
          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi
          git commit -m "Auto-update meal data: $(date -u -d '+9 hours' +'%Y-%m-%d')"
          git push
